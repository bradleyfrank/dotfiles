---
# tasks file for repositories

- name: Install gpg keys
  apt_key:
    url: "{{ item.key | default(omit) }}"
    keyring: "{{ item.keyring | default(omit) }}"
    id: "{{ item.id | default(omit) }}"
    keyserver: "{{ keyserver.id | default(omit) }}"
  loop: "{{ repos }}"
  become: true

- name: Install repositories
  apt_repository:
    repo: "{{ repo }}"
  loop: "{{ repos }}"
  become: true