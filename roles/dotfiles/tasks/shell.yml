---
  # tasks file for dotfiles

- name: Set 'work_only' tag for scripts
  vars:
    host_skip_tags: work_only
  tags:
    - work_only

- name: Set 'home_only' tag for scripts
  vars:
    host_skip_tags: home_only
  tags:
    - home_only

- name: Load shared variables
  include_vars: shell/shared.yml
  tags:
    - dotfiles

- name: Load distribution variables
  include_vars: "shell/{{ ansible_distribution }}.yml"
  tags:
    - dotfiles

- name: Build zshrc
  template:
    src: "zshrc.j2"
    dest: "{{ ansible_env.HOME }}/.zshrc"
    backup: True
  vars:
    exports: "{{ shared_exports + distribution_exports | default([]) }}"
    paths: "{{ shared_paths + distribution_paths | default([]) }}"
    manpaths: "{{ shared_manpaths + distribution_manpaths | default([]) }}"
    aliases: "{{ shared_aliases | combine(distribution_aliases) }}"
    functions: "{{ shared_functions | combine(distribution_functions) }}"
  tags:
    - dotfiles

- name: Build bash_profile
  template:
    src: 'bash_profile.j2'
    dest: "{{ ansible_env.HOME }}/.bash_profile"
    backup: True
  vars:
    exports: "{{ shared_exports + distribution_exports | default([]) }}"
    paths: "{{ shared_paths + distribution_paths | default([]) }}"
    manpaths: "{{ shared_manpaths + distribution_manpaths | default([]) }}"
  tags:
    - dotfiles

- name: Build bashrc
  template:
    src: 'bashrc.j2'
    dest: "{{ ansible_env.HOME }}/.bashrc"
    backup: True
  vars:
    aliases: "{{ shared_aliases | combine(distribution_aliases) }}"
    functions: "{{ shared_functions | combine(distribution_functions) }}"
  tags:
    - dotfiles