---
# tasks file for dotfiles

- name: Create ~/Development folder structure
  file:
    path: "{{ ansible_env.HOME }}/Development/{{ item }}"
    state: directory
    mode: '0755'
  with_items: ['Projects', 'Build', 'Scratch']
  tags:
    - dotfiles

- name: Create ~/.local folder structure
  file:
    path: "{{ ansible_env.HOME }}/.local/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - bin
    - etc
    - include
    - lib
    - opt
    - share
    - var
  tags:
    - dotfiles

- name: Create ~/.config directory
  file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'
  tags:
    - dotfiles


- name: Install scripts
  copy:
    src: scripts/
    dest: "{{ ansible_env.HOME }}/.local/bin/"
    mode: '0755'
  tags:
    - dotfiles
    - scripts


- name: Install base dotfiles
  import_tasks:
    file: base.yml
  tags:
    - dotfiles
    - apps

- name: Setup ssh
  import_tasks:
    file: ssh.yml
  tags:
    - dotfiles
    - ssh

- name: Setup Vim
  import_tasks:
    file: vim.yml
  tags:
    - dotfiles
    - vim

- name: Setup VSCode
  copy:
    src: vscode/
    dest: "{{ vscode_config }}"
    mode: '0755'

- name: Configure Bash and Zsh
  import_tasks:
    file: shell.yml
  tags:
    - dotfiles
    - shell
