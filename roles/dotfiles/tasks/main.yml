---
# tasks file for dotfiles

- name: Load per-OS variables
  include_vars: "{{ ansible_distribution }}.yml"
  tags:
    - dotfiles

- name: Create homedir structure
  import_tasks: tasks/homedir.yml
  tags:
    - dotfiles
    - homedir

- name: Install scripts
  copy:
    src: scripts/
    dest: "{{ ansible_env.HOME }}/.local/bin/"
    mode: '0755'
  tags:
    - dotfiles
    - scripts

- name: Install VSCode configs
  copy:
    src: vscode/
    dest: "{{ vscode_config }}"
    mode: '0755'

- name: Install utility dotfiles
  import_tasks: tasks/utils.yml
  tags:
    - dotfiles
    - utilities

- name: Setup ssh
  import_tasks: tasks/ssh.yml
  tags:
    - dotfiles
    - ssh

- name: Setup Vim
  import_tasks: tasks/vim.yml
  tags:
    - dotfiles
    - vim

- name: Configure Bash and Zsh
  import_tasks: tasks/shell.yml
  tags:
    - dotfiles
    - shell
