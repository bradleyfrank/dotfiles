---
# tasks file for dotfiles

- name: Create ~/Development folder structure
  file:
    path: "{{ ansible_env.HOME }}/Development/{{ item }}"
    state: directory
    recurse: True
    mode: '0755'
  with_items: ['Projects', 'Build', 'Scratch']

- name: Configure ~/.ssh directory
  file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'

- name: Create dotfile directories
  file:
    path: "{{ ansible_env.HOME }}/{{ item.path }}"
    state: directory
    mode: '0755'
  with_filetree: dotfiles/
  when: item.state == 'directory'

- name: Apply shared dotfiles
  copy:
    src: "{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.path }}"
    mode: '0755'
  with_filetree: dotfiles/
  when: item.state == 'file'

- name: Apply home-only dotfiles
  copy:
    src: "{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.path }}"
  with_filetree: home/
  when: item.state == 'file'
  tags:
    - home_only

- name: Set proper permissions on ~/.ssh/authorized_keys
  file:
    path: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
    state: touch
    mode: '0600'

- name: Set proper permissions on ~/.ssh/config
  file:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    state: touch
    mode: '0644'

- name: Create vim extensions directory path
  file:
    path: "{{ vim_extensions_path }}"
    state: directory
    mode: '0755'

- name: Install vim-airline
  git:
    repo: https://github.com/vim-airline/vim-airline.git
    dest: "{{ vim_extensions_path }}/vim-airline"
    depth: '1'
    version: "{{ vim_airline_version }}"

- name: Install vim-airline-themes
  git:
    repo: https://github.com/vim-airline/vim-airline-themes.git
    dest: "{{ vim_extensions_path }}/vim-airline-themes"
    depth: '1'

- name: Install VSCode extensions
  command:
    cmd: "{{ vscode }} --install-extension {{ item }}"
  with_items: "{{ vscode_extensions }}"
  tags: packages

- name: Install Python packages
  pip:
    name: "{{ python_packages }}"
    extra_args: --user
  tags: packages