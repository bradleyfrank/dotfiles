---
# vars file for dotfiles

vim_extensions_path: "{{ ansible_env.HOME }}/.vim/pack/default/start"
vim_airline_version: 'v0.11'

python_packages:
  - black
  - dns-lexicon
  - imgur_downloader
  - pip-autoremove
  - pip_upgrade_outdated
  - pycodestyle
  - pydf
  - pyflakes
  - pylint
  - tmuxp
  - tuir

vscode_extensions:
  - bitzl.vscode-puppet
  - bungcip.better-toml
  - donjayamanne.githistory
  - haaaad.ansible
  - mhutchie.git-graph
  - mikestead.dotenv
  - ms-azuretools.vscode-docker
  - redhat.vscode-yaml
  - Remisa.shellman
  - rogalmic.bash-debug
  - samuelcolvin.jinjahtml
  - shd101wyy.markdown-preview-enhanced
  - timonwong.shellcheck
  - Tyriar.sort-lines
  - vortizhe.simple-ruby-erb