---
# tasks file for packages

- name: Install Manjaro packages
  pacman:
    name: "{{ base_packages | default([]) }}"
    state: present
    update_cache: true
  become: true
  tags:
    - packages

- name: Install Manjaro AUR packages
  aur:
    name: "{{ aur_packages | default([]) }}"
    use: yay
    state: present
  tags:
    - packages
