---
# tasks file for packages

- name: Install Fedora packages
  dnf:
    name: "{{ base_packages | default([]) }}"
    state: present
    update_cache: true
    install_weak_deps: true
    autoremove: true
    autoclean: true
  become: true
  tags:
    - packages

- name: Install Fedora Gnome packages
  dnf:
    name: "{{ gnome_packages | default([]) }}"
    state: present
    update_cache: true
    install_weak_deps: true
  become: true
  when: "'gnome' in desktop | lower"
  tags:
    - packages
