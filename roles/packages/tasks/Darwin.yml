---
# tasks file for packages

- name: Install Homebrew taps
  homebrew_tap:
    name: "{{ taps }}"
  tags:
    - packages


- name: Install base Homebrew packages
  homebrew:
    name: "{{ base_packages }}"
  tags:
    - packages

- name: Install home-only Homebrew packages
  homebrew:
    name: "{{ home_packages }}"
  tags:
    - packages
    - home_only


- name: Install base Homebrew casks
  homebrew_cask:
    name: "{{ base_casks }}"
    sudo_password: "{{ ansible_become_pass }}"
  tags:
    - packages

- name: Install home-only Homebrew casks
  homebrew_cask:
    name: "{{ home_casks }}"
    sudo_password: "{{ ansible_become_pass }}"
  tags:
    - packages
    - home_only

- name: Install work-only Homebrew casks
  homebrew_cask:
    name: "{{ work_casks }}"
    sudo_password: "{{ ansible_become_pass }}"
  tags:
    - packages
    - work_only


- name: Install home-only Mac App Store applications
  command:
    cmd: "/usr/local/bin/mas install {{ item }}"
  loop: "{{ home_apps }}"
  tags:
    - packages
    - home_only
