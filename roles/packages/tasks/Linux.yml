---
# tasks file for packages

- name: Install OS packages
  become: true
  package:
    name: "{{ base_packages }}"
    state: present
  tags:
    - packages

- name: Install Gnome packages
  package:
    name: "{{ gnome_packages }}"
    state: present
  become: true
  when: "'gnome' in {{ ansible_env.XDG_CURRENT_DESKTOP | lower }}"
  tags:
    - packages

- name: Install home-only OS packages
  package:
    name: "{{ home_packages }}"
    state: present
  become: true
  tags:
    - home_only
    - packages

- name: Install work-only OS packages
  package:
    name: "{{ work_packages }}"
    state: present
  become: true
  tags:
    - work_only
    - packages
