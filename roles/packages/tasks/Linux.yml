---
# tasks file for packages

- name: Install Ubuntu packages
  apt:
    name: "{{ base_packages | default([]) }}"
    state: present
    update_cache: true
    install_recommends: true
    autoremove: true
    autoclean: true
  become: true
  when: "'Ubuntu' in ansible_distribution"
  tags:
    - packages

- name: Install Ubuntu Gnome packages
  apt:
    name: "{{ gnome_packages | default([]) }}"
    state: present
    update_cache: true
    install_recommends: true
    autoremove: true
    autoclean: true
  when: "'gnome' in desktop | lower"
  become: true
  when: "'Ubuntu' in ansible_distribution"
  tags:
    - packages


- name: Install Fedora packages
  dnf:
    name: "{{ base_packages | default([]) }}"
    state: present
    update_cache: true
    install_weak_deps: true
    autoremove: true
    autoclean: true
  become: true
  when: "'Fedora' in ansible_distribution"
  tags:
    - packages

- name: Install Fedora Gnome packages
  dnf:
    name: "{{ gnome_packages | default([]) }}"
    state: present
    update_cache: true
    install_weak_deps: true
  when: "'gnome' in desktop | lower"
  become: true
  when: "'Fedora' in ansible_distribution"
  tags:
    - packages


- name: Install fonts
  copy:
    src: fonts/
    dest: /usr/local/share/fonts/
    mode: 0644
  when: ansible_env.XDG_CURRENT_DESKTOP is defined
  become: true
  tags:
    - fonts
    - packages

- name: Refresh font list
  command: fc-cache -fv
  when: ansible_env.XDG_CURRENT_DESKTOP is defined
  become: true
  tags:
    - fonts
    - packages


- name: Install VSCode extensions
  command: "/usr/bin/code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  when: desktop != 'none'
  tags:
    - packages
    - vscode
