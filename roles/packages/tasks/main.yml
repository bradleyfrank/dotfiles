---
# tasks file for packages

- name: Install Linux repositories
  import_role:
    name: repositories
  when: "'linux' in ansible_system | lower"

- name: Load OS packages lists
  include_vars: "{{ ansible_distribution }}.yml"
  tags:
    - packages

- name: "Include {{ ansible_system }} package installs"
  include_tasks: "{{ ansible_system }}.yml"
  tags:
    - packages

- name: Install VSCode extensions
  command: "{{ usr_path }}/bin/code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  when: ansible_env.XDG_CURRENT_DESKTOP is defined
  tags:
    - packages
    - vscode

- name: Install Python packages
  pip:
    name: "{{ python_packages }}"
    extra_args: --user
  tags:
    - packages
    - python
