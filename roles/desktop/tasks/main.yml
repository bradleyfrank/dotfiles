---
# tasks file for desktop

- name: Apply desktop settings
  include_tasks: "{{ desktop }}.yml"
  tags:
    - always

- name: Make zsh default for user
  user:
    name: "{{ ansible_env.USER }}"
    shell: "{{ usr_path }}/bin/zsh"
  become: true
  tags:
    - shell

- name: Make bash default for root
  user:
    name: root
    shell: "{{ usr_path }}/bin/bash"
  become: true
  tags:
    - root
    - shell

- name: Install root dotfiles
  copy:
    src: root/
    dest: "{{ rootdir }}/"
    mode: 0644
  become: true
  tags:
    - root
